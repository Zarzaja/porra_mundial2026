<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil - Porra Mundial 2026</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/app.js"></script>
</head>
<body>
  
  <header>
    <!-- Rendered dynamically by app.js -->
  </header>

  <main>
    <div style="max-width: 600px; margin: 0 auto;">
      <div class="glass-card">
        <div class="auth-title" style="margin-bottom: 1.5rem;">
          <h1>⚙️ Editar Perfil</h1>
          <p>Cambia el nombre de tu equipo o tu escudo</p>
        </div>

        <form id="profile-form" enctype="multipart/form-data">
          <div class="form-group">
            <label for="team_name">Nombre del Equipo</label>
            <input type="text" id="team_name" class="form-input" placeholder="Ej: Los cracks de Madrid" required>
          </div>

          <div class="form-group">
            <label for="crest-upload">Escudo del Equipo</label>
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 0.5rem;">
              <div style="display: flex; align-items: center; gap: 1rem;">
                <img id="current-crest" src="/uploads/default-crest.png" style="width: 60px; height: 60px; object-fit: contain; background: rgba(255,255,255,0.1); border-radius: 8px;">
                <input type="file" id="crest-upload" class="form-input" accept="image/*" style="flex: 1;">
              </div>
              
              <!-- Default library selection -->
              <div>
                <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">O elige uno de nuestra biblioteca:</label>
                <input type="hidden" id="selected-default-crest" name="default_crest" value="">
                <div class="default-crests-grid" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                  <img class="default-crest-option" src="/uploads/crest-default-1.svg" data-filename="crest-default-1.svg" style="width: 40px; height: 40px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 2px; transition: all 0.2s;" onclick="selectDefaultCrest(this)">
                  <img class="default-crest-option" src="/uploads/crest-default-2.svg" data-filename="crest-default-2.svg" style="width: 40px; height: 40px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 2px; transition: all 0.2s;" onclick="selectDefaultCrest(this)">
                  <img class="default-crest-option" src="/uploads/crest-default-3.svg" data-filename="crest-default-3.svg" style="width: 40px; height: 40px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 2px; transition: all 0.2s;" onclick="selectDefaultCrest(this)">
                  <img class="default-crest-option" src="/uploads/crest-default-4.svg" data-filename="crest-default-4.svg" style="width: 40px; height: 40px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 2px; transition: all 0.2s;" onclick="selectDefaultCrest(this)">
                  <img class="default-crest-option" src="/uploads/crest-default-5.svg" data-filename="crest-default-5.svg" style="width: 40px; height: 40px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 2px; transition: all 0.2s;" onclick="selectDefaultCrest(this)">
                  <img class="default-crest-option" src="/uploads/crest-default-6.svg" data-filename="crest-default-6.svg" style="width: 40px; height: 40px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 2px; transition: all 0.2s;" onclick="selectDefaultCrest(this)">
                </div>
              </div>
            </div>
            <small style="color: var(--text-muted); font-size: 0.8rem;">Máximo 5MB. Formatos: JPG, PNG, GIF, SVG</small>
          </div>

          <div id="preview-section" style="display: none; margin-top: 1rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.85rem;">Vista previa del nuevo escudo:</p>
            <img id="new-crest-preview" style="width: 80px; height: 80px; object-fit: contain; background: rgba(255,255,255,0.1); border-radius: 8px; margin-top: 0.5rem;">
          </div>

          <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem;">
            💾 Guardar Cambios
          </button>

          <button type="button" onclick="window.location.href='/'" class="btn btn-secondary" style="width: 100%; margin-top: 0.75rem;">
            ← Volver al Inicio
          </button>
        </form>

        <div id="success-message" style="display: none; margin-top: 1rem; padding: 1rem; background: rgba(34, 197, 94, 0.2); border-radius: 8px; text-align: center; color: #22c55e; font-weight: 600;">
          ✓ Perfil actualizado correctamente
        </div>
      </div>
    </div>
  </main>

  <script>
    async function initProfilePage() {
      // Check auth
      if (!checkAuth()) {
        window.location.href = '/login.html';
        return;
      }

      // Load header
      renderHeader();

      // Load current profile
      try {
        const data = await apiFetch('/api/profile');
        document.getElementById('team_name').value = data.user.team_name || '';
        const currentCrestUrl = data.user.team_crest || '/uploads/default-crest.png';
        document.getElementById('current-crest').src = currentCrestUrl;
        
        // Highlight active default crest if matches
        if (currentCrestUrl.includes('crest-default-')) {
          const filename = currentCrestUrl.split('/').pop();
          const option = document.querySelector(`.default-crest-option[data-filename="${filename}"]`);
          if (option) {
            option.style.borderColor = 'var(--accent-indigo)';
            document.getElementById('selected-default-crest').value = filename;
          }
        }
      } catch (err) {
        showToast(err.message, true);
      }

      // Preview new image
      document.getElementById('crest-upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (evt) => {
            document.getElementById('new-crest-preview').src = evt.target.result;
            document.getElementById('preview-section').style.display = 'block';
          };
          reader.readAsDataURL(file);

          // Clear default selections
          document.querySelectorAll('.default-crest-option').forEach(opt => {
            opt.style.borderColor = 'transparent';
          });
          document.getElementById('selected-default-crest').value = '';
        }
      });
    }

    function selectDefaultCrest(el) {
      document.querySelectorAll('.default-crest-option').forEach(opt => {
        opt.style.borderColor = 'transparent';
      });
      el.style.borderColor = 'var(--accent-indigo)';
      document.getElementById('selected-default-crest').value = el.getAttribute('data-filename');
      // Clear file input since we selected a default one
      document.getElementById('crest-upload').value = '';
      document.getElementById('preview-section').style.display = 'none';
      document.getElementById('current-crest').src = el.src;
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const teamName = document.getElementById('team_name').value.trim();
      const crestInput = document.getElementById('crest-upload');
      const formData = new FormData();
      
      if (teamName) {
        formData.append('team_name', teamName);
      }
      if (crestInput.files[0]) {
        formData.append('crest', crestInput.files[0]);
      }
      const defaultCrest = document.getElementById('selected-default-crest').value;
      if (defaultCrest) {
        formData.append('default_crest', defaultCrest);
      }

      try {
        const response = await fetch('/api/profile/update', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${sessionStorage.getItem('token')}`
          },
          body: formData
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Error al actualizar perfil');
        }

        const data = await response.json();
        
        // Update session
        sessionStorage.setItem('user', JSON.stringify(data.user));
        
        // Show success
        document.getElementById('success-message').style.display = 'block';
        document.getElementById('current-crest').src = data.user.team_crest;
        document.getElementById('preview-section').style.display = 'none';
        crestInput.value = '';
        
        setTimeout(() => {
          document.getElementById('success-message').style.display = 'none';
        }, 3000);
        
      } catch (err) {
        showToast(err.message, true);
      }
    });

    initProfilePage();
  </script>
</body>
</html>
